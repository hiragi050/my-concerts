<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Concerts - Hiragi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; -webkit-font-smoothing: antialiased; }
        .ticket-card {
            position: relative;
            border-radius: 1.25rem;
            overflow: hidden;
            display: flex;
            height: 8rem; /* 稍微縮小高度，沒圖片時比例更精緻 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .ticket-card::before, .ticket-card::after {
            content: '';
            position: absolute;
            right: 25%;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            z-index: 10;
        }
        .ticket-card::before { top: -10px; }
        .ticket-card::after { bottom: -10px; }
        .left-part { width: 75%; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; justify-content: center; }
        .right-part { width: 25%; display: flex; flex-direction: column; items-center; justify-content: center; z-index: 5; }
        .divider { 
            border-left: 1.5px dotted rgba(255,255,255,0.3); 
            height: 70%; 
            position: absolute; 
            right: 25%; 
            top: 15%;
        }
    </style>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto">
        
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">我的演唱會</h1>
            <div class="flex items-center gap-4 text-gray-400">
                <button class="text-2xl">⋮</button>
                <button class="text-pink-500 text-3xl font-light">+</button>
            </div>
        </div>

        <div class="relative mb-8">
            <input type="text" placeholder="搜尋演唱會或歌手" class="w-full bg-gray-100 rounded-full py-3 px-6 text-sm focus:outline-none">
        </div>

        <div class="space-y-4">

            <div class="ticket-card text-white concert-item" data-date="2026-04-05" style="background: linear-gradient(to right, #6b634d 75%, #5a5341 75%);">
                <div class="left-part">
                    <h2 class="font-bold text-lg">Tuki. 演唱會</h2>
                    <p class="text-xs opacity-80 mt-1">台北小巨蛋</p>
                    <p class="text-[11px] mt-3 opacity-90">🕒 17:00</p>
                </div>
                <div class="divider"></div>
                <div class="right-part text-center">
                    <span class="text-[10px] opacity-70">APR</span>
                    <span class="text-3xl font-black">05</span>
                    <span class="mt-2 text-[10px] bg-white/20 px-2 py-0.5 rounded-full countdown-tag">...</span>
                </div>
            </div>

            <div class="ticket-card text-white concert-item" data-date="2026-04-12" style="background: linear-gradient(to right, #4c3b71 75%, #3d2f5c 75%);">
                <div class="left-part">
                    <h2 class="font-bold text-lg">邦邦演唱會</h2>
                    <p class="text-xs opacity-80 mt-1">大佳河濱公園</p>
                    <p class="text-[11px] mt-3 opacity-90">🕒 18:00</p>
                </div>
                <div class="divider"></div>
                <div class="right-part text-center">
                    <span class="text-[10px] opacity-70">APR</span>
                    <span class="text-3xl font-black">12</span>
                    <span class="mt-2 text-[10px] bg-white/20 px-2 py-0.5 rounded-full countdown-tag">...</span>
                </div>
            </div>

            <div class="ticket-card text-white concert-item" data-date="2026-06-20" style="background: linear-gradient(to right, #a13d6d 75%, #8a335d 75%);">
                <div class="left-part">
                    <h2 class="font-bold text-lg">LiSA 演唱會</h2>
                    <p class="text-xs opacity-80 mt-1">台北小巨蛋</p>
                    <p class="text-[11px] mt-3 opacity-90">🕒 17:00</p>
                </div>
                <div class="divider"></div>
                <div class="right-part text-center">
                    <span class="text-[10px] opacity-70">JUN</span>
                    <span class="text-3xl font-black">20</span>
                    <span class="mt-2 text-[10px] bg-white/20 px-2 py-0.5 rounded-full countdown-tag">...</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        function updateCountdowns() {
            const now = new Date();
            document.querySelectorAll('.concert-item').forEach(item => {
                const targetDate = new Date(item.getAttribute('data-date'));
                const tag = item.querySelector('.countdown-tag');
                const diff = targetDate - now;
                const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));
                
                if (daysLeft > 0) tag.textContent = `${daysLeft} 天`;
                else if (daysLeft === 0) { tag.textContent = `今天!`; tag.style.background = '#e53e3e'; }
                else tag.textContent = `已結束`;
            });
        }
        updateCountdowns();
    </script>
</body>
</html>
